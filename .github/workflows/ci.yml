name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pipeline
        run: PYTHONPATH=src python scripts/run_pipeline.py

      - name: Run tests
        run: PYTHONPATH=src python -m pytest

      - name: Run ruff
        run: PYTHONPATH=src python -m ruff check .

      - name: Run mypy
        run: PYTHONPATH=src python -m mypy src

      - name: Run quality gate
        run: PYTHONPATH=src python scripts/run_quality_gate.py
